<VirtualHost *:80>
    ServerName mysteriousface.local
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/mysteriousface/web

    <Directory /var/www/html/mysteriousface/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/mysteriousface-error.log
    CustomLog ${APACHE_LOG_DIR}/mysteriousface-access.log combined
</VirtualHost>
